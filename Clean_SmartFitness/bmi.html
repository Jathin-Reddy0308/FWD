<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Fitness | BMI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo">FitTrack</div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="workout.html">Workouts</a></li>
                <li><a href="bmi.html">BMI</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <section class="card">
            <h2>BMI Calculator</h2>
            <label for="weight">Weight (kg):</label>
            <input type="number" id="weight" step="0.1" required>
            
            <label for="height">Height (cm):</label>
            <input type="number" id="height" required>
            
            <button onclick="calculateBMI()" class="btn">Calculate BMI</button>
            
            <div id="bmiResult" style="margin-top:20px; font-weight:bold;"></div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
