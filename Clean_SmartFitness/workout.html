<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Fitness | Workouts</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo">FitTrack</div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="workout.html">Workouts</a></li>
                <li><a href="bmi.html">BMI</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section>
            <h2>Workout Log</h2>
            <form id="workoutForm">
                <label for="exercise">Exercise Name:</label>
                <input type="text" id="exercise" placeholder="e.g. Running" required>
                
                <label for="duration">Duration (mins):</label>
                <input type="number" id="duration" min="1" max="500" required>
                
                <button type="submit" class="btn" id="addBtn">Add Workout</button>
            </form>

            <div id="workoutDisplay" class="workout-grid">
                <!-- Content added dynamically here -->
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
