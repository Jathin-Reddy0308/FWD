<!DOCTYPE html>
<html>
<head>
    <title>Login – Food Saver</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<nav>
    <h2>🌿 Food Saver</h2>
    <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="donate.html">Donate</a></li>
        <li><a href="request.html">Request</a></li>
        <li><a href="login.html" class="active">Login</a></li>
    </ul>
</nav>

<div class="login-wrap">
    <div class="login-card">
        <h2>Welcome Back 👋</h2>
        <p>Login to your Food Saver account</p>

        <form id="loginForm">
            <input type="text" id="loginUser" placeholder="Username" required>
            <input type="password" id="loginPass" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>

        <p id="loginMsg"></p>

        <hr>

        <h3 style="text-align:center; margin-bottom:4px;">New Here?</h3>
        <p style="text-align:center; font-size:13px;">Create an account to get started.</p>

        <form id="signupForm">
            <input type="text" id="signupUser" placeholder="Choose a Username" required>
            <input type="password" id="signupPass" placeholder="Choose a Password" required>
            <button type="submit">Sign Up</button>
        </form>

        <p id="signupMsg"></p>
    </div>
</div>

<footer>© 2026 Food Saver &nbsp;|&nbsp; Made with 💚 to fight food waste</footer>

<script src="script.js"></script>
</body>
</html>
